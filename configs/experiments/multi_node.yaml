# Multi-Node Experiment Configuration
experiment:
  name: "multi_node_scaling"
  description: "Multi-node expert parallelism scaling study (up to 4 nodes)"
  models: [dbrx, deepseek_v3]

  node_configs:
    - num_nodes: 2
      gpus_per_node: 8
      total_gpus: 16
    - num_nodes: 4
      gpus_per_node: 8
      total_gpus: 32

  placement_strategies:
    - name: "ep_internode"
      enable_expert_parallel: true
      tensor_parallel_size: 1
      all2all_backend: "allgather_reducescatter"
      description: "Pure EP across nodes"
    - name: "tp_intra_ep_inter"
      enable_expert_parallel: true
      tensor_parallel_size: 8
      all2all_backend: "allgather_reducescatter"
      description: "TP within node, EP across nodes"

  workloads:
    - name: "high_throughput"
      num_prompts: 1000
      input_len: 512
      output_len: 256

  concurrency_levels: [32, 64, 128, 256, 512]

  metrics:
    - throughput_tokens_per_sec
    - time_to_first_token_ms
    - inter_token_latency_ms
    - e2e_latency_ms
    - cross_node_comm_time_ms
    - expert_load_balance_score

  profiling:
    enabled: false
    torch_profiler: true
    rocm_profiler: false
    trace_dir: "results/profiles/multi_node"

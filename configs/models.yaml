    active_params_b: 2.7
    num_experts: 60
    top_k: 4
    num_shared_experts: 4
    architecture: "qwen2_moe"
    dtype: "bfloat16"
    min_gpus: 1
    notes: "Smallest MoE; good baseline for single-GPU placement studies"

  olmoe_1b_7b:

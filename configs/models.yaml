experiment_groups:
  single_gpu: [qwen_moe_a2.7b, olmoe_1b_7b, mixtral_8x7b]
  multi_gpu: [mixtral_8x7b, qwen2_57b_a14b, dbrx]
  multi_node: [dbrx, deepseek_v3]
  all: [qwen_moe_a2.7b, olmoe_1b_7b, mixtral_8x7b, qwen2_57b_a14b, dbrx, deepseek_v3]
